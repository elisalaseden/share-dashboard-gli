# ------------------------------------------------------------
# PATHS
# ------------------------------------------------------------
paths:
  raw_data:        "data/raw/"
  processed_data:  "data/processed/"
  master:          "data/master.csv"
  fx_file:         "data/raw/tipos_de_cambio.xlsx"
  log_dir:         "logs/"

# ------------------------------------------------------------
# FINGERPRINT DEL EXCEL DE SHARES
# ------------------------------------------------------------
shares_file:
  header_row: 2
  skip_rows: [0, 1]

  columns:
    categoria:    "Categoría"
    sub_cat:      "cat"
    laboratorio:  "Laboratorio"
    producto:     "Producto"
    metric_name:  "MetricName"
    anio_movil:   "Año Móvil"
    valor:        "Rolling 12M (Metric Selector)"

  metric_values:
    market_share: "%MS (Rolling 12M)"
    market_size:  "Mercado (Rolling 12M)"

  anio_movil_map:
    "Año Móvil 1 (Últimos 12M)": "am1"
    "Año Móvil 2":               "am2"
    "Año Móvil 3":               "am3"
    "Año Móvil 4":               "am4"
    "Año Móvil 5":               "am5"

  sheets:
    ARG: "Argentina"
    BRA: "Brasil"
    CHI: "Chile"
    COL: "Colombia"
    ECU: "Ecuador"
    MEX: "México"
    PER: "Perú"

  genomma_string: "GENOMMA LAB"

# ------------------------------------------------------------
# FINGERPRINT DEL ARCHIVO TIPO DE CAMBIO
# ------------------------------------------------------------
fx_file:
  sheet:       "Resumen"
  date_col:    1
  header_row:  9

  er_columns:
    ARG: 9
    BRA: 15
    CHI: 18
    COL: 21
    ECU: null
    MEX: 3
    PER: 30

# ------------------------------------------------------------
# SCHEMA DEL MASTER.CSV
# ------------------------------------------------------------
master_schema:
  primary_key:
    - pais
    - categoria
    - sub_categoria
    - laboratorio
    - producto

  dimensions:
    - pais
    - pais_nombre
    - categoria
    - sub_categoria
    - laboratorio
    - producto
    - es_genomma

  market_share:
    - ms_am1
    - ms_am2
    - ms_am3
    - ms_am4
    - ms_am5

  market_size_local:
    - mkt_am1
    - mkt_am2
    - mkt_am3
    - mkt_am4
    - mkt_am5

  market_size_usd:
    - mkt_usd_am1
    - mkt_usd_am2
    - mkt_usd_am3
    - mkt_usd_am4
    - mkt_usd_am5

  fx_metadata:
    - er_aplicado

# ------------------------------------------------------------
# REGLAS DE VALIDACIÓN
# ------------------------------------------------------------
validation:
  ms_range:
    min: 0.0
    max: 100.0

  mkt_min: 0.0

  required_not_null:
    - pais
    - categoria
    - sub_categoria
    - laboratorio
    - producto
    - mkt_am1

  on_validation_failure: "skip"

# ------------------------------------------------------------
# CONFIGURACIÓN DE LOGS
# ------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  file_pattern: "logs/pipeline_{date}.log"
